# =========================================================
# Configuracion del servidor
# =========================================================
server.port=8080
spring.application.name=firma-titular

# =========================================================
# Conexion a la base de datos SQL Server
# Ajusta host, puerto, BD, usuario y password reales
# =========================================================
spring.datasource.url=jdbc:sqlserver://TU_SERVIDOR:1433;databaseName=TU_BASE;encrypt=true;trustServerCertificate=true
spring.datasource.username=TU_USUARIO
spring.datasource.password=TU_PASSWORD
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================================================
# Carpeta compartida de Windows (ruta UNC) donde se guardan
# las fotos de los titulares.
# IMPORTANTE:
#  - El usuario con el que corre el servicio Spring Boot
#    (o el usuario de Windows del proceso java.exe) debe
#    tener permisos de lectura/escritura sobre esta ruta.
#  - Si el server Linux/Windows no esta en el mismo dominio,
#    hay que montar la ruta con credenciales (ver notas abajo).
# =========================================================
app.storage.ruta-compartida=\\\\servidor\\carpeta\\Firmas

# Tamaño maximo de request (la imagen viaja en Base64 dentro del JSON)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=15MB
spring.mvc.async.request-timeout=30000
